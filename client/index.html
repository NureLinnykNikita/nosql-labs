<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaDB — MongoDB CRUD Dashboard</title>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #0a0c10;
      --surface:  #111419;
      --panel:    #181c24;
      --border:   #252b38;
      --accent:   #00e5a0;
      --accent2:  #3d7fff;
      --warn:     #ff5e5e;
      --text:     #d4dbe8;
      --muted:    #556070;
      --tag-a:    #00e5a0;
      --tag-b:    #3d7fff;
      --tag-c:    #ff9f43;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
    }

    /* ─ Layout ─ */
    .app { display: flex; height: 100vh; overflow: hidden; }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .sidebar-logo {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.5px;
      color: #fff;
    }
    .sidebar-logo span { color: var(--accent); }
    .sidebar-logo p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: .5px;
    }

    .nav { flex: 1; padding: 12px 0; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
      border-left: 3px solid transparent;
      letter-spacing: .3px;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .nav-item.active {
      color: var(--accent);
      background: rgba(0,229,160,.07);
      border-left-color: var(--accent);
    }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

    .nav-section {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding: 16px 20px 6px;
      text-transform: uppercase;
    }

    .db-badge {
      margin: 12px;
      padding: 8px 12px;
      background: rgba(0,229,160,.06);
      border: 1px solid rgba(0,229,160,.2);
      border-radius: 6px;
    }
    .db-badge .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .db-badge .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      margin-top: 2px;
    }
    .db-badge .dot {
      display: inline-block; width: 6px; height: 6px;
      background: var(--accent); border-radius: 50%;
      margin-right: 6px; animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .3; }
    }

    /* ─ Main ─ */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      height: 56px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      background: var(--surface);
    }
    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex: 1;
    }
    .topbar-title span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 8px;
    }

    .content { flex: 1; overflow-y: auto; padding: 24px; }

    /* ─ Stats ─ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .stat-card.blue::before { background: linear-gradient(90deg, var(--accent2), transparent); }
    .stat-card.orange::before { background: linear-gradient(90deg, var(--tag-c), transparent); }
    .stat-card .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .stat-card .value {
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -2px;
      line-height: 1;
    }
    .stat-card .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ─ Bar chart ─ */
    .chart-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    .chart-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }
    .chart-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bar-item { margin-bottom: 10px; }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }
    .bar-fill.blue { background: var(--accent2); }

    /* ─ Table ─ */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    input, select, textarea {
      background: var(--border);
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 8px 12px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }
    input::placeholder { color: var(--muted); }
    select option { background: var(--panel); }
    textarea { resize: vertical; min-height: 60px; }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      transition: all .15s;
      white-space: nowrap;
      letter-spacing: .3px;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-secondary:hover { border-color: var(--text); color: var(--text); }
    .btn-danger { background: rgba(255,94,94,.15); color: var(--warn); border: 1px solid rgba(255,94,94,.3); }
    .btn-danger:hover { background: rgba(255,94,94,.25); }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .btn-blue { background: var(--accent2); color: #fff; }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 11px 12px;
      border-bottom: 1px solid rgba(37,43,56,.6);
      font-size: 13px;
      color: var(--text);
      vertical-align: middle;
    }
    tr:hover td { background: rgba(255,255,255,.02); }
    tr:last-child td { border-bottom: none; }

    .table-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    /* ─ Tags ─ */
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .5px;
    }
    .tag-green { background: rgba(0,229,160,.15); color: var(--accent); }
    .tag-blue  { background: rgba(61,127,255,.15); color: var(--accent2); }
    .tag-red   { background: rgba(255,94,94,.15); color: var(--warn); }
    .tag-gray  { background: rgba(85,96,112,.2); color: var(--muted); }
    .tag-orange{ background: rgba(255,159,67,.15); color: var(--tag-c); }

    /* ─ Modal ─ */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .field input, .field select, .field textarea { width: 100%; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

    /* ─ Toast ─ */
    .toast-wrap {
      position: fixed;
      bottom: 24px; right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 9999;
    }
    .toast {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
    .toast-success { background: rgba(0,229,160,.1); border-color: rgba(0,229,160,.3); color: var(--accent); }
    .toast-error   { background: rgba(255,94,94,.1); border-color: rgba(255,94,94,.3); color: var(--warn); }

    /* ─ Map ─ */
    #map { height: 400px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 16px; }

    .geo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .geo-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .geo-panel-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .geo-result-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .geo-result-item:last-child { border-bottom: none; }
    .geo-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 13px;
    }
    .empty span { font-size: 28px; display: block; margin-bottom: 8px; }

    .loader {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .actions-row { display: flex; gap: 6px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .type-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 5px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = "http://localhost:3001/api";

// ─── Utilities ─────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = (msg, type = "success") => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  };
  return { toasts, ok: msg => add(msg, "success"), err: msg => add(msg, "error") };
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Помилка запиту");
  return data;
}

const LEVEL_COLORS = { A1: "tag-green", A2: "tag-green", B1: "tag-blue", B2: "tag-blue", C1: "tag-orange", C2: "tag-red" };
const ROLE_COLORS  = { user: "tag-gray", admin: "tag-red", contentManager: "tag-blue", moderator: "tag-orange" };
const CENTER_COLORS = { school: "#00e5a0", university: "#3d7fff", library: "#ff9f43", online: "#c084fc" };

// ─── Toast ─────────────────────────────────────────────────────────────────
function ToastPanel({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// ─── Stats Page ─────────────────────────────────────────────────────────────
function StatsPage() {
  const [stats, setStats] = useState(null);

  useEffect(() => {
    apiFetch("/stats").then(setStats).catch(console.error);
  }, []);

  if (!stats) return <div className="empty"><div className="loader" /> Завантаження...</div>;

  const maxLevel = Math.max(...(stats.coursesByLevel.map(c => c.count) || [1]));
  const maxRole  = Math.max(...(stats.usersByRole.map(r => r.count) || [1]));

  return (
    <>
      <div className="stats-grid">
        <div className="stat-card">
          <div className="label">Користувачі</div>
          <div className="value">{stats.userCount}</div>
          <div className="sub">зареєстровано в системі</div>
        </div>
        <div className="stat-card blue">
          <div className="label">Курси</div>
          <div className="value">{stats.courseCount}</div>
          <div className="sub">навчальних програм</div>
        </div>
        <div className="stat-card orange">
          <div className="label">Записи</div>
          <div className="value">{stats.enrollCount}</div>
          <div className="sub">активних / завершених</div>
        </div>
      </div>

      <div className="chart-row">
        <div className="chart-card">
          <div className="chart-title">📊 Курси за рівнем</div>
          {stats.coursesByLevel.map(item => (
            <div className="bar-item" key={item._id}>
              <div className="bar-label">
                <span>{item._id || "—"}</span>
                <span>{item.count}</span>
              </div>
              <div className="bar-track">
                <div className="bar-fill" style={{ width: `${(item.count / maxLevel) * 100}%` }} />
              </div>
            </div>
          ))}
        </div>
        <div className="chart-card">
          <div className="chart-title">👥 Користувачі за роллю</div>
          {stats.usersByRole.map(item => (
            <div className="bar-item" key={item._id}>
              <div className="bar-label">
                <span>{item._id || "—"}</span>
                <span>{item.count}</span>
              </div>
              <div className="bar-track">
                <div className="bar-fill blue" style={{ width: `${(item.count / maxRole) * 100}%` }} />
              </div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

// ─── Users Page ─────────────────────────────────────────────────────────────
function UsersPage({ toast }) {
  const [users, setUsers]       = useState([]);
  const [loading, setLoading]   = useState(false);
  const [search, setSearch]     = useState("");
  const [role, setRole]         = useState("");
  const [modal, setModal]       = useState(null); // null | 'create' | user-obj
  const [form, setForm]         = useState({});
  const [saving, setSaving]     = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams();
      if (search) params.set("search", search);
      if (role) params.set("role", role);
      setUsers(await apiFetch("/users?" + params));
    } catch(e) { toast.err(e.message); }
    finally { setLoading(false); }
  }, [search, role]);

  useEffect(() => { load(); }, [load]);

  const openCreate = () => { setForm({ role: "user" }); setModal("create"); };
  const openEdit   = u => { setForm({ username: u.username, email: u.email, role: u.role, bio: u.bio }); setModal(u); };

  const save = async () => {
    setSaving(true);
    try {
      if (modal === "create") {
        await apiFetch("/users", { method: "POST", body: form });
        toast.ok("Користувача додано ✓");
      } else {
        await apiFetch("/users/" + modal._id, { method: "PUT", body: form });
        toast.ok("Оновлено ✓");
      }
      setModal(null);
      load();
    } catch(e) { toast.err(e.message); }
    finally { setSaving(false); }
  };

  const del = async (u) => {
    if (!confirm(`Видалити ${u.username}?`)) return;
    try {
      await apiFetch("/users/" + u._id, { method: "DELETE" });
      toast.ok("Видалено ✓");
      load();
    } catch(e) { toast.err(e.message); }
  };

  return (
    <>
      <div className="section-header">
        <div className="section-title">Користувачі</div>
        <button className="btn btn-primary" onClick={openCreate}>+ Додати</button>
      </div>

      <div className="search-row">
        <input placeholder="🔍 Пошук за username..." value={search}
          onChange={e => setSearch(e.target.value)} style={{ flex: 1 }} />
        <select value={role} onChange={e => setRole(e.target.value)}>
          <option value="">Всі ролі</option>
          <option value="user">user</option>
          <option value="admin">admin</option>
          <option value="contentManager">contentManager</option>
          <option value="moderator">moderator</option>
        </select>
      </div>

      <div className="table-card">
        {loading ? <div className="empty"><div className="loader" /></div> : users.length === 0 ? (
          <div className="empty"><span>👤</span>Нічого не знайдено</div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Роль</th>
                <th>Bio</th>
                <th>Створено</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {users.map(u => (
                <tr key={u._id}>
                  <td style={{ fontWeight: 600, color: "#fff" }}>{u.username}</td>
                  <td style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 11 }}>{u.email}</td>
                  <td><span className={`tag ${ROLE_COLORS[u.role] || "tag-gray"}`}>{u.role}</span></td>
                  <td style={{ color: "var(--muted)", fontSize: 12, maxWidth: 160, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{u.bio || "—"}</td>
                  <td style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 11, color: "var(--muted)" }}>
                    {u.createdAt ? new Date(u.createdAt).toLocaleDateString("uk") : "—"}
                  </td>
                  <td>
                    <div className="actions-row">
                      <button className="btn btn-secondary btn-sm" onClick={() => openEdit(u)}>✏️</button>
                      <button className="btn btn-danger btn-sm" onClick={() => del(u)}>🗑</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {modal && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && setModal(null)}>
          <div className="modal">
            <div className="modal-title">
              {modal === "create" ? "Новий користувач" : `Редагування: ${modal.username}`}
              <button onClick={() => setModal(null)}>×</button>
            </div>
            <div className="field"><label>Username *</label>
              <input value={form.username || ""} onChange={e => setForm(f => ({...f, username: e.target.value}))} /></div>
            <div className="field"><label>Email *</label>
              <input value={form.email || ""} onChange={e => setForm(f => ({...f, email: e.target.value}))} /></div>
            <div className="field"><label>Роль</label>
              <select value={form.role || "user"} onChange={e => setForm(f => ({...f, role: e.target.value}))}>
                <option value="user">user</option>
                <option value="admin">admin</option>
                <option value="contentManager">contentManager</option>
                <option value="moderator">moderator</option>
              </select>
            </div>
            <div className="field"><label>Bio</label>
              <textarea value={form.bio || ""} onChange={e => setForm(f => ({...f, bio: e.target.value}))} /></div>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={() => setModal(null)}>Скасувати</button>
              <button className="btn btn-primary" onClick={save} disabled={saving}>
                {saving ? <span className="loader" /> : "Зберегти"}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ─── Courses Page ─────────────────────────────────────────────────────────────
function CoursesPage({ toast }) {
  const [courses, setCourses]   = useState([]);
  const [loading, setLoading]   = useState(false);
  const [search, setSearch]     = useState("");
  const [level, setLevel]       = useState("");
  const [modal, setModal]       = useState(null);
  const [form, setForm]         = useState({});
  const [saving, setSaving]     = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const p = new URLSearchParams();
      if (search) p.set("search", search);
      if (level) p.set("level", level);
      setCourses(await apiFetch("/courses?" + p));
    } catch(e) { toast.err(e.message); }
    finally { setLoading(false); }
  }, [search, level]);

  useEffect(() => { load(); }, [load]);

  const save = async () => {
    setSaving(true);
    try {
      if (modal === "create") {
        await apiFetch("/courses", { method: "POST", body: form });
        toast.ok("Курс додано ✓");
      } else {
        await apiFetch("/courses/" + modal._id, { method: "PUT", body: form });
        toast.ok("Оновлено ✓");
      }
      setModal(null);
      load();
    } catch(e) { toast.err(e.message); }
    finally { setSaving(false); }
  };

  const del = async c => {
    if (!confirm(`Видалити курс "${c.title}"?`)) return;
    try { await apiFetch("/courses/" + c._id, { method: "DELETE" }); toast.ok("Видалено ✓"); load(); }
    catch(e) { toast.err(e.message); }
  };

  return (
    <>
      <div className="section-header">
        <div className="section-title">Курси</div>
        <button className="btn btn-primary" onClick={() => { setForm({ level: "A1" }); setModal("create"); }}>+ Додати</button>
      </div>

      <div className="search-row">
        <input placeholder="🔍 Пошук за назвою..." value={search}
          onChange={e => setSearch(e.target.value)} style={{ flex: 1 }} />
        <select value={level} onChange={e => setLevel(e.target.value)}>
          <option value="">Всі рівні</option>
          {["A1","A2","B1","B2","C1","C2"].map(l => <option key={l} value={l}>{l}</option>)}
        </select>
      </div>

      <div className="table-card">
        {loading ? <div className="empty"><div className="loader" /></div> : courses.length === 0 ? (
          <div className="empty"><span>📚</span>Нічого не знайдено</div>
        ) : (
          <table>
            <thead>
              <tr><th>Назва</th><th>Рівень</th><th>Мова</th><th>Опис</th><th>Дата</th><th></th></tr>
            </thead>
            <tbody>
              {courses.map(c => (
                <tr key={c._id}>
                  <td style={{ fontWeight: 600, color: "#fff" }}>{c.title}</td>
                  <td><span className={`tag ${LEVEL_COLORS[c.level] || "tag-gray"}`}>{c.level}</span></td>
                  <td style={{ fontSize: 12 }}>{c.languageName || "—"}</td>
                  <td style={{ color: "var(--muted)", fontSize: 12, maxWidth: 180, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.description || "—"}</td>
                  <td style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 11, color: "var(--muted)" }}>
                    {c.createdAt ? new Date(c.createdAt).toLocaleDateString("uk") : "—"}
                  </td>
                  <td>
                    <div className="actions-row">
                      <button className="btn btn-secondary btn-sm" onClick={() => { setForm({ title: c.title, description: c.description, level: c.level }); setModal(c); }}>✏️</button>
                      <button className="btn btn-danger btn-sm" onClick={() => del(c)}>🗑</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {modal && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && setModal(null)}>
          <div className="modal">
            <div className="modal-title">
              {modal === "create" ? "Новий курс" : `Редагування: ${modal.title}`}
              <button onClick={() => setModal(null)}>×</button>
            </div>
            <div className="field"><label>Назва *</label>
              <input value={form.title || ""} onChange={e => setForm(f => ({...f, title: e.target.value}))} /></div>
            <div className="field"><label>Рівень *</label>
              <select value={form.level || "A1"} onChange={e => setForm(f => ({...f, level: e.target.value}))}>
                {["A1","A2","B1","B2","C1","C2"].map(l => <option key={l} value={l}>{l}</option>)}
              </select>
            </div>
            <div className="field"><label>Опис</label>
              <textarea value={form.description || ""} onChange={e => setForm(f => ({...f, description: e.target.value}))} /></div>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={() => setModal(null)}>Скасувати</button>
              <button className="btn btn-primary" onClick={save} disabled={saving}>
                {saving ? <span className="loader" /> : "Зберегти"}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ─── Geodata Page ─────────────────────────────────────────────────────────────
function GeoPage({ toast }) {
  const mapRef    = useRef(null);
  const leafRef   = useRef(null);
  const markersRef= useRef([]);

  const [centers, setCenters]         = useState([]);
  const [nearby,  setNearby]          = useState([]);
  const [inCity,  setInCity]          = useState([]);
  const [modal,   setModal]           = useState(null);
  const [form,    setForm]            = useState({});
  const [saving,  setSaving]          = useState(false);

  const [nearForm, setNearForm]       = useState({ lat: "50.004", lng: "36.231", radius: "10000" });
  const [cityForm, setCityForm]       = useState({ city: "kharkiv" });
  const [clickCoords, setClickCoords] = useState(null);

  const load = useCallback(async () => {
    try { setCenters(await apiFetch("/geo/centers")); }
    catch(e) { toast.err(e.message); }
  }, []);

  useEffect(() => { load(); }, [load]);

  // Ініціалізація карти
  useEffect(() => {
    if (!mapRef.current || leafRef.current) return;
    const map = L.map(mapRef.current).setView([49.8, 31.2], 6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap"
    }).addTo(map);

    map.on("click", e => {
      setClickCoords({ lat: e.latlng.lat.toFixed(6), lng: e.latlng.lng.toFixed(6) });
    });

    leafRef.current = map;
    return () => { map.remove(); leafRef.current = null; };
  }, []);

  // Оновлення маркерів
  useEffect(() => {
    const map = leafRef.current;
    if (!map) return;
    markersRef.current.forEach(m => m.remove());
    markersRef.current = centers.map(c => {
      const [lng, lat] = c.location.coordinates;
      const color = CENTER_COLORS[c.type] || "#fff";
      const icon = L.divIcon({
        html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 6px ${color}66;"></div>`,
        className: "", iconSize: [14, 14], iconAnchor: [7, 7],
      });
      return L.marker([lat, lng], { icon })
        .addTo(map)
        .bindPopup(`<b style="color:#111">${c.name}</b><br><small>${c.type}</small>${c.description ? `<br>${c.description}` : ""}`);
    });
  }, [centers]);

  // Відкрити форму через клік на карті
  useEffect(() => {
    if (clickCoords) {
      setForm(f => ({ ...f, lat: clickCoords.lat, lng: clickCoords.lng }));
    }
  }, [clickCoords]);

  const save = async () => {
    setSaving(true);
    try {
      if (modal === "create") {
        await apiFetch("/geo/centers", { method: "POST", body: form });
        toast.ok("Заклад додано ✓");
      } else {
        await apiFetch("/geo/centers/" + modal._id, { method: "PUT", body: form });
        toast.ok("Оновлено ✓");
      }
      setModal(null);
      setClickCoords(null);
      load();
    } catch(e) { toast.err(e.message); }
    finally { setSaving(false); }
  };

  const del = async c => {
    if (!confirm(`Видалити "${c.name}"?`)) return;
    try { await apiFetch("/geo/centers/" + c._id, { method: "DELETE" }); toast.ok("Видалено ✓"); load(); }
    catch(e) { toast.err(e.message); }
  };

  const searchNearby = async () => {
    try {
      const p = new URLSearchParams({ lat: nearForm.lat, lng: nearForm.lng, radius: nearForm.radius });
      const res = await apiFetch("/geo/nearby?" + p);
      setNearby(res);
      toast.ok(`Знайдено: ${res.length} закладів ($near)`);
      // Центрувати карту
      if (leafRef.current) leafRef.current.setView([parseFloat(nearForm.lat), parseFloat(nearForm.lng)], 12);
    } catch(e) { toast.err(e.message); }
  };

  const searchInCity = async () => {
    try {
      const res = await apiFetch("/geo/within-city?city=" + cityForm.city);
      setInCity(res);
      toast.ok(`Знайдено: ${res.length} закладів ($geoWithin)`);
    } catch(e) { toast.err(e.message); }
  };

  return (
    <>
      <div className="section-header">
        <div className="section-title">Геодані — Навчальні заклади</div>
        <button className="btn btn-primary" onClick={() => { setForm({ type: "school", lat: clickCoords?.lat || "", lng: clickCoords?.lng || "" }); setModal("create"); }}>
          + Додати заклад
        </button>
      </div>

      {clickCoords && (
        <div style={{ marginBottom: 12, padding: "8px 14px", background: "rgba(0,229,160,.08)", border: "1px solid rgba(0,229,160,.25)", borderRadius: 6, fontSize: 12, display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ color: "var(--accent)" }}>📍</span>
          <span>Вибрано точку: <b style={{ fontFamily: "JetBrains Mono, monospace" }}>{clickCoords.lat}, {clickCoords.lng}</b></span>
          <button className="btn btn-primary btn-sm" onClick={() => { setForm(f => ({...f, lat: clickCoords.lat, lng: clickCoords.lng, type: "school"})); setModal("create"); }}>
            Додати тут
          </button>
        </div>
      )}

      <div id="map" ref={mapRef} />

      <div className="geo-grid">
        {/* $near */}
        <div className="geo-panel">
          <div className="geo-panel-title">🔍 <b>$near</b> — пошук поруч</div>
          <div className="field"><label>Широта</label>
            <input value={nearForm.lat} onChange={e => setNearForm(f => ({...f, lat: e.target.value}))} /></div>
          <div className="field"><label>Довгота</label>
            <input value={nearForm.lng} onChange={e => setNearForm(f => ({...f, lng: e.target.value}))} /></div>
          <div className="field"><label>Радіус (м)</label>
            <input value={nearForm.radius} onChange={e => setNearForm(f => ({...f, radius: e.target.value}))} /></div>
          <button className="btn btn-blue" onClick={searchNearby} style={{ width: "100%", marginBottom: 12 }}>Шукати</button>
          {nearby.map(c => (
            <div className="geo-result-item" key={c._id}>
              <span className="geo-dot" style={{ background: CENTER_COLORS[c.type] }} />
              <div>
                <div style={{ fontWeight: 600, fontSize: 12, color: "#fff" }}>{c.name}</div>
                <div style={{ fontSize: 11, color: "var(--muted)" }}>{c.type} · {c.location.coordinates[1].toFixed(4)}, {c.location.coordinates[0].toFixed(4)}</div>
              </div>
            </div>
          ))}
          {nearby.length === 0 && <div style={{ color: "var(--muted)", fontSize: 11 }}>Результати з'являться після пошуку</div>}
        </div>

        {/* $geoWithin */}
        <div className="geo-panel">
          <div className="geo-panel-title">🗺 <b>$geoWithin</b> — пошук у місті</div>
          <div className="field"><label>Місто</label>
            <select value={cityForm.city} onChange={e => setCityForm({ city: e.target.value })} style={{ width: "100%" }}>
              <option value="kharkiv">Харків</option>
              <option value="kyiv">Київ</option>
              <option value="lviv">Львів</option>
            </select>
          </div>
          <button className="btn btn-blue" onClick={searchInCity} style={{ width: "100%", marginBottom: 12 }}>Шукати</button>
          {inCity.map(c => (
            <div className="geo-result-item" key={c._id}>
              <span className="geo-dot" style={{ background: CENTER_COLORS[c.type] }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 12, color: "#fff" }}>{c.name}</div>
                <div style={{ fontSize: 11, color: "var(--muted)" }}>{c.type}</div>
              </div>
            </div>
          ))}
          {inCity.length === 0 && <div style={{ color: "var(--muted)", fontSize: 11 }}>Результати з'являться після пошуку</div>}
        </div>
      </div>

      {/* Centers list */}
      <div className="section-header" style={{ marginTop: 4 }}>
        <div className="section-title" style={{ fontSize: 14 }}>Всі заклади ({centers.length})</div>
      </div>
      <div className="table-card">
        {centers.length === 0 ? (
          <div className="empty"><span>🏫</span>Заклади відсутні. Натисніть на карті, щоб додати.</div>
        ) : (
          <table>
            <thead>
              <tr><th>Назва</th><th>Тип</th><th>Координати</th><th>Опис</th><th></th></tr>
            </thead>
            <tbody>
              {centers.map(c => (
                <tr key={c._id}>
                  <td style={{ fontWeight: 600, color: "#fff" }}>{c.name}</td>
                  <td>
                    <span className="type-dot" style={{ background: CENTER_COLORS[c.type] }} />
                    {c.type}
                  </td>
                  <td style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 11, color: "var(--muted)" }}>
                    {c.location.coordinates[1].toFixed(4)}, {c.location.coordinates[0].toFixed(4)}
                  </td>
                  <td style={{ color: "var(--muted)", fontSize: 12 }}>{c.description || "—"}</td>
                  <td>
                    <div className="actions-row">
                      <button className="btn btn-secondary btn-sm" onClick={() => {
                        setForm({ name: c.name, description: c.description, type: c.type, lat: c.location.coordinates[1], lng: c.location.coordinates[0] });
                        setModal(c);
                      }}>✏️</button>
                      <button className="btn btn-danger btn-sm" onClick={() => del(c)}>🗑</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {modal && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && setModal(null)}>
          <div className="modal">
            <div className="modal-title">
              {modal === "create" ? "Новий заклад" : `Редагування: ${modal.name}`}
              <button onClick={() => setModal(null)}>×</button>
            </div>
            <div className="field"><label>Назва *</label>
              <input value={form.name || ""} onChange={e => setForm(f => ({...f, name: e.target.value}))} /></div>
            <div className="field"><label>Тип</label>
              <select value={form.type || "school"} onChange={e => setForm(f => ({...f, type: e.target.value}))}>
                <option value="school">school</option>
                <option value="university">university</option>
                <option value="library">library</option>
                <option value="online">online</option>
              </select>
            </div>
            <div className="field"><label>Широта *</label>
              <input value={form.lat || ""} onChange={e => setForm(f => ({...f, lat: e.target.value}))} /></div>
            <div className="field"><label>Довгота *</label>
              <input value={form.lng || ""} onChange={e => setForm(f => ({...f, lng: e.target.value}))} /></div>
            <div className="field"><label>Опис</label>
              <textarea value={form.description || ""} onChange={e => setForm(f => ({...f, description: e.target.value}))} /></div>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={() => setModal(null)}>Скасувати</button>
              <button className="btn btn-primary" onClick={save} disabled={saving}>
                {saving ? <span className="loader" /> : "Зберегти"}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ─── App Shell ─────────────────────────────────────────────────────────────
const PAGES = [
  { id: "stats",   icon: "📊", label: "Огляд / Статистика",  section: "Головна" },
  { id: "users",   icon: "👤", label: "Користувачі",          section: "CRUD" },
  { id: "courses", icon: "📚", label: "Курси",                section: "CRUD" },
  { id: "geo",     icon: "🗺", label: "Геодані",              section: "MongoDB Geo" },
];

export default function App() {
  const [page, setPage] = useState("stats");
  const toast = useToast();

  const sections = [...new Set(PAGES.map(p => p.section))];

  const titles = {
    stats:   ["Огляд системи", "агрегація + статистика"],
    users:   ["Користувачі",   "CRUD · MongoDB collection"],
    courses: ["Курси",         "CRUD · $lookup агрегація"],
    geo:     ["Геодані",       "$near · $geoWithin · 2dsphere index"],
  };
  const [title, sub] = titles[page] || ["—", ""];

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <h1>Lingua<span>DB</span></h1>
          <p>MONGODB DASHBOARD</p>
        </div>

        <nav className="nav">
          {sections.map(sec => (
            <React.Fragment key={sec}>
              <div className="nav-section">{sec}</div>
              {PAGES.filter(p => p.section === sec).map(p => (
                <div key={p.id}
                  className={`nav-item ${page === p.id ? "active" : ""}`}
                  onClick={() => setPage(p.id)}
                >
                  <span className="icon">{p.icon}</span>
                  {p.label}
                </div>
              ))}
            </React.Fragment>
          ))}
        </nav>

        <div className="db-badge">
          <div className="label">База даних</div>
          <div className="value"><span className="dot" />nosql_nure_project</div>
        </div>
      </aside>

      <div className="main">
        <div className="topbar">
          <div className="topbar-title">
            {title}
            <span>{sub}</span>
          </div>
        </div>

        <div className="content">
          {page === "stats"   && <StatsPage />}
          {page === "users"   && <UsersPage toast={toast} />}
          {page === "courses" && <CoursesPage toast={toast} />}
          {page === "geo"     && <GeoPage toast={toast} />}
        </div>
      </div>

      <ToastPanel toasts={toast.toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
